<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conforma PR Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <h1>Conforma PR Dashboard</h1>
        </div>
        <div class="stats">
            <div class="stat">
                <span class="stat-value" id="total-count">0</span>
                <span class="stat-label">PRs shown</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="avg-age">—</span>
                <span class="stat-label">Avg. age of visible PRs</span>
            </div>
        </div>
    </header>

    <div class="filters">
        <div class="filter-group">
            <label class="filter-label">Type</label>
            <div class="type-buttons" id="type-filter">
                <button class="type-btn active" data-type="all">All</button>
                <button class="type-btn" data-type="regular">Regular</button>
                <button class="type-btn" data-type="automated">Automated</button>
                <button class="type-btn" data-type="wip">WIP</button>
            </div>
        </div>
        <div class="filter-group">
            <label class="filter-label" for="author-filter">Author</label>
            <select id="author-filter">
                <option value="all">All authors</option>
            </select>
        </div>
        <div class="filter-group">
            <label class="filter-label" for="repo-filter">Repository</label>
            <select id="repo-filter">
                <option value="all">All repos</option>
            </select>
        </div>
        <div class="filter-group">
            <label class="toggle-label">
                <input type="checkbox" id="ready-filter">
                <span>Ready for review</span>
            </label>
        </div>
    </div>

    <div class="table-container">
        <table class="pr-table">
            <thead>
                <tr>
                    <th class="sortable" data-sort="title">Title</th>
                    <th class="sortable" data-sort="repo">Repo</th>
                    <th class="sortable" data-sort="author">Author</th>
                    <th>CI</th>
                    <th>Size</th>
                    <th class="sortable" data-sort="reviews">Reviews</th>
                    <th>Conv.</th>
                    <th class="sortable" data-sort="created_at">Age</th>
                    <th class="sortable" data-sort="updated_at">Updated</th>
                </tr>
            </thead>
            <tbody id="pr-table-body">
            </tbody>
        </table>
    </div>

    <div id="empty-state" class="empty-state" hidden>
        No pull requests match the current filters.
    </div>

    <div id="error-banner" class="error-banner" hidden>
        Failed to load PR data. Try refreshing.
    </div>

    <footer class="footer">
        <span id="last-updated">Loading...</span>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
